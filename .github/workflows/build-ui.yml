name: Build UI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        shell: bash
        run: |
          set -euxo pipefail
          npm install -g pnpm@9.12.1
          pnpm --version

      - name: Preflight diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          ls -la
          node --version
          npm --version
          which pnpm
          pnpm --version

      - name: Read project version
        shell: bash
        run: |
          set -euxo pipefail
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); console.log('Project version:', pkg.version ?? 'unknown')"

      - name: Check lockfile drift
        shell: bash
        run: |
          set -euxo pipefail
          grep -nE '^\s{2}[^[:space:]].*:$' pnpm-lock.yaml | head -n 5 || true
          cp pnpm-lock.yaml pnpm-lock.before.yaml
          pnpm install --lockfile-only --ignore-scripts --reporter append-only
          diff -u pnpm-lock.before.yaml pnpm-lock.yaml || true
          mv pnpm-lock.before.yaml pnpm-lock.yaml

      - name: Install dependencies
        shell: bash
        env:
          HUSKY: '0'
        run: |
          set -euxo pipefail
          pnpm install --no-frozen-lockfile --reporter append-only

      - name: Type check (informational)
        continue-on-error: true
        shell: bash
        run: |
          set -euxo pipefail
          pnpm type-check

      - name: Build UI
        shell: bash
        run: |
          set -euxo pipefail
          pnpm exec vite build --debug
