name: Build UI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Versions
        shell: bash
        run: |
          set -euo pipefail
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "pnpm: $(pnpm --version)"

      - name: Read project version
        shell: bash
        run: |
          set -euo pipefail
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); console.log('Project version:', pkg.version ?? 'unknown')"

      - name: Install dependencies
        shell: bash
        env:
          HUSKY: '0'
          CI: 'true'
        run: |
          set -euo pipefail
          pnpm install --no-frozen-lockfile --reporter=append-only

      - name: Type check (informational)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          pnpm type-check

      - name: Build UI
        shell: bash
        env:
          CI: 'true'
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          set -euo pipefail
          pnpm build --debug
