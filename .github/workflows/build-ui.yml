name: Build UI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 9.12.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Preflight diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          ls -la
          node --version
          pnpm --version

      - name: Read project version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f package.json ]]; then
            echo "package.json not found in $(pwd)"
            ls -la
            exit 1
          fi
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); console.log('Project version:', pkg.version ?? 'unknown')"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (informational)
        continue-on-error: true
        run: pnpm type-check

      - name: Build UI
        shell: bash
        run: |
          set -o pipefail
          pnpm exec vite build --debug 2>&1 | tee build-ui.log

      - name: Show build log on failure
        if: failure()
        shell: bash
        run: |
          if [[ -f build-ui.log ]]; then
            echo "===== build-ui.log ====="
            cat build-ui.log
          else
            echo "build-ui.log not found; failure happened before Vite build started."
          fi
