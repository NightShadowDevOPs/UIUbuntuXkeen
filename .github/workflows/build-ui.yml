name: Build UI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        shell: bash
        run: |
          set -euxo pipefail
          npm install -g pnpm@9.12.1
          pnpm --version

      - name: Preflight diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          ls -la
          node --version
          npm --version
          which pnpm
          pnpm --version

      - name: Read project version
        shell: bash
        run: |
          set -euxo pipefail
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); console.log('Project version:', pkg.version ?? 'unknown')"

      - name: Check lockfile drift
        shell: bash
        run: |
          set -euxo pipefail
          node <<'NODE'
          const fs = require('node:fs')
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const lock = fs.readFileSync('pnpm-lock.yaml', 'utf8')
          const deps = Object.keys(pkg.dependencies || {})
          const missing = deps.filter((name) => {
            return !lock.includes(`
      '${name}':`) && !lock.includes(`
      ${name}:`)
          })
          if (missing.length) {
            console.log('Lockfile drift detected for dependencies:', missing.join(', '))
          } else {
            console.log('No dependency drift detected in pnpm-lock importer section.')
          }
          NODE

      - name: Install dependencies
        shell: bash
        env:
          HUSKY: '0'
        run: |
          set -euxo pipefail
          pnpm install --no-frozen-lockfile --reporter append-only

      - name: Type check (informational)
        continue-on-error: true
        shell: bash
        run: |
          set -euxo pipefail
          pnpm type-check

      - name: Build UI
        shell: bash
        run: |
          set -euxo pipefail
          pnpm exec vite build --debug
