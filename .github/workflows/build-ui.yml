name: Build UI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          npm install -g pnpm@9.12.1
          node --version
          npm --version
          pnpm --version
          which pnpm

      - name: Read project version
        shell: bash
        run: |
          set -euo pipefail
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); console.log('Project version:', pkg.version ?? 'unknown')"

      - name: Install dependencies
        shell: bash
        env:
          HUSKY: '0'
          CI: 'true'
        run: |
          set -euo pipefail
          pnpm install --no-frozen-lockfile --reporter=append-only > install-deps.log 2>&1 || {
            code=$?
            echo "===== install-deps.log ====="
            cat install-deps.log || true
            exit $code
          }
          echo "===== install-deps.log ====="
          cat install-deps.log || true

      - name: Type check (informational)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          pnpm type-check

      - name: Build UI
        shell: bash
        env:
          CI: 'true'
        run: |
          set -euo pipefail
          pnpm exec vite build --debug > build-ui.log 2>&1 || {
            code=$?
            echo "===== build-ui.log ====="
            cat build-ui.log || true
            exit $code
          }
          echo "===== build-ui.log ====="
          cat build-ui.log || true
