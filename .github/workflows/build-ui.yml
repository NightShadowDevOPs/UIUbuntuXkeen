name: Build UI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        shell: bash
        run: |
          set -euxo pipefail
          npm install -g pnpm@9.12.1
          pnpm --version

      - name: Preflight diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          ls -la
          node --version
          npm --version
          pnpm --version

      - name: Read project version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f package.json ]]; then
            echo "package.json not found in $(pwd)"
            ls -la
            exit 1
          fi
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); console.log('Project version:', pkg.version ?? 'unknown')"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (informational)
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm type-check 2>&1 | tee type-check.log

      - name: Build UI
        shell: bash
        run: |
          set +e
          pnpm exec vite build --debug 2>&1 | tee build-ui.log
          status=${PIPESTATUS[0]}
          echo "Build exit code: $status"
          if [[ $status -ne 0 ]]; then
            echo "===== build-ui.log ====="
            cat build-ui.log
            exit $status
          fi
