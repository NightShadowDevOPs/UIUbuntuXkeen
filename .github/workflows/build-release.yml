name: build-release

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Read project version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version=$(python3 - <<'PYJSON'
          import json
          with open('package.json', 'r', encoding='utf-8') as f:
              print(json.load(f)['version'])
          PYJSON
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Preflight diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          {
            echo "event=${{ github.event_name }}"
            echo "ref=${{ github.ref }}"
            echo "runner_os=$RUNNER_OS"
            echo "node=$(node -v)"
            echo "pnpm=$(pnpm -v)"
            echo "python=$(python3 --version 2>&1)"
            echo "cwd=$PWD"
            echo "package_json=$(test -f package.json && echo yes || echo no)"
            echo "pnpm_lock=$(test -f pnpm-lock.yaml && echo yes || echo no)"
            echo "lockfile_sha256:"
            sha256sum package.json pnpm-lock.yaml
          } | tee ci-logs/preflight.log

      - name: Install dependencies
        shell: bash
        env:
          CI: true
          HUSKY: 0
        run: |
          set +e
          mkdir -p ci-logs
          echo '--- pnpm install log begin ---'
          pnpm install --frozen-lockfile --ignore-scripts --reporter=append-only 2>&1 | tee ci-logs/pnpm-install.log
          status=${PIPESTATUS[0]}
          echo '--- pnpm install log end ---'
          exit $status

      - name: Type check (informational)
        if: ${{ success() }}
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          pnpm type-check 2>&1 | tee ci-logs/type-check.log

      - name: Build UI
        if: ${{ success() }}
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          pnpm build 2>&1 | tee ci-logs/build.log

      - name: Print build log tail on failure
        if: ${{ failure() }}
        shell: bash
        run: |
          echo '--- build.log (last 200 lines) ---'
          tail -n 200 ci-logs/build.log || true

      - name: Pack release archives
        if: ${{ success() }}
        run: |
          mkdir -p release
          cd dist
          zip -qr ../release/dist.zip .
          cd ..
          cp release/dist.zip "release/uiubuntuxkeen-dist-v${{ steps.meta.outputs.version }}.zip"

      - name: Upload build artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: uiubuntuxkeen-build-${{ steps.meta.outputs.version }}
          path: release/
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: uiubuntuxkeen-build-${{ needs.build.outputs.version }}
          path: release

      - name: Publish versioned release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: release/uiubuntuxkeen-dist-v${{ needs.build.outputs.version }}.zip

      - name: Publish rolling release for in-UI updates
        uses: ncipollo/release-action@v1
        with:
          tag: rolling
          name: rolling
          prerelease: true
          makeLatest: false
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: release/dist.zip
